storage:
  s3:
    bucket: ${STORAGE_S3_BUCKET}
    region: ${STORAGE_S3_REGION}
    key-prefix: konect/
    max-upload-bytes: 20971520
  cdn:
    base-url: ${STORAGE_CDN_BASE_URL}

slack:
  webhooks:
    error: ${SLACK_WEBHOOK_ERROR}
    event: ${SLACK_WEBHOOK_EVENT}
  signing-secret: ${SLACK_SIGNING_SECRET}
  bot-token: ${SLACK_BOT_TOKEN}

claude:
  api-key: ${CLAUDE_API_KEY}
  model: ${CLAUDE_MODEL:claude-sonnet-4-20250514}

mcp:
  url: ${MCP_BRIDGE_URL:http://localhost:3100}

google:
  sheets:
    credentials-path: ${GOOGLE_SHEETS_CREDENTIALS_PATH}
    application-name: ${GOOGLE_SHEETS_APP_NAME:KONECT}
    template-spreadsheet-id: ${GOOGLE_SHEETS_TEMPLATE_ID:}
